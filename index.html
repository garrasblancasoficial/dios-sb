<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pixel God Simulator</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: monospace; overflow: hidden; }
        #canvas { display: block; image-rendering: pixelated; /* ¡Importante para el estilo pixel! */ }
        #toolbar { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        button { background: #444; color: #fff; border: 1px solid #666; padding: 5px 10px; cursor: pointer; margin-right: 5px; }
        button.active { background: #884444; border-color: #ffaaaa; }
    </style>
</head>
<body>

    <div id="toolbar">
        <h3>Herramientas de Dios</h3>
        <button onclick="setTool('human')" id="btn-human">Colocar Humano</button>
        <button onclick="setTool('cloud')" id="btn-cloud">Colocar Nube</button>
        <button onclick="setTool('water')" id="btn-water">Pintar Agua</button>
        <span id="stats">Entes: 0</span>
    </div>

    <canvas id="canvas"></canvas>

    <script src="simulador.js"></script>
</body>
</html>
